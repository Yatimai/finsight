name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install mypy pydantic pyyaml anthropic fastapi structlog
      - run: mypy app/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install pydantic pyyaml anthropic fastapi structlog uvicorn \
                      pytest pytest-asyncio pytest-cov httpx Pillow
      - run: pytest --cov=app --cov-report=term-missing -m "not slow and not gpu and not integration"
