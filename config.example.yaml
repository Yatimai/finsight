# config.yaml — Multimodal RAG for Financial Documents
# Copy to config.yaml and fill in your API key.

retrieval:
  model: "vidore/colqwen2.5-v0.2"
  top_k: 10                      # Retrieval depth (over-fetches ×3 internally for document filtering)
  max_candidates: 50
  mask_non_image_embeddings: true   # Filter non-visual tokens (prompt, special)
  prefetch_k: 100                   # Two-stage search: prefetch candidates
  border_crop: true                 # Remove white margins before encoding

rewriting:
  enabled: true
  max_rewrites: 3           # 1 = simple rewrite, 3 = RAG Fusion
  rrf_k: 60                 # RRF constant (standard = 60)

generation:
  model: "claude-sonnet-4-5-20250929"
  max_tokens: 1024
  temperature: 0.0

verification:
  model: "claude-opus-4-6"
  fallback_models:
    - "claude-opus-4-5-20250929"
  enabled: true
  mode: "batch_async"       # "sync" | "batch_async" | "disabled"
  confidence_threshold: 0.7
  abstention_message: "Cette information n'apparaît pas dans les documents fournis."

caching:
  semantic_cache_enabled: true
  similarity_threshold: 0.98    # High threshold to avoid "CA 2023" ≈ "CA 2022" false hits
  prompt_cache_ttl: "1h"
  max_cache_entries: 1000

qdrant:
  mode: "remote"            # "remote" required — data uses Qdrant server format
  path: "./data/qdrant"
  collection_name: "financial_pages"
  remote_url: "http://localhost:6333"
  #
  # IMPORTANT: les données dans data/qdrant/ sont au format natif du serveur
  # Qdrant Rust. Le mode "embedded" (qdrant-client Python local) ne peut PAS
  # lire ce format. Il faut toujours un serveur Qdrant:
  #
  #   docker run -d -p 6333:6333 -v ./data/qdrant:/qdrant/storage qdrant/qdrant
  #
  # Le serveur doit tourner AVANT de lancer l'API ou l'évaluation.

error_handling:
  generation_max_retries: 3
  verification_max_retries: 5
  rewriting_max_retries: 1
  rewriting_fallback: "raw_query"
  backoff_base: 2
  use_retry_after_header: true

security:
  prompt_separation: true
  output_citation_check: true
  log_anomalies: true
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:8501"
  rate_limit: "10/minute"

observability:
  log_level: "INFO"
  trace_all_requests: true
  export_metrics: true

anthropic:
  api_key: ""               # Or set ANTHROPIC_API_KEY env var
  timeout_seconds: 30.0

data:
  documents_dir: "./data/documents"
  pages_dir: "./data/pages"
  dpi: 300                  # PDF to image resolution
  batch_size: 8             # Pages per batch for GPU encoding
  chunk_size: 50            # Pages per chunk for PDF processing (reduces peak RAM)
